name: Flatpak-Builder

permissions:
  contents: write

on:
  workflow_dispatch:
  push:
    tags:
      - 'v?[0-9]+.[0-9]+.[0-9]+'

jobs:
  flatpak:
    name: "Flatpak"
    runs-on: ubuntu-latest
    container:
      image: bilelmoussaoui/flatpak-github-actions:gnome-44
      options: --privileged
    steps:
    - uses: actions/checkout@v4

    - name: Install Python dependencies
      run: pip3 install aiohttp toml

    - name: Generate Cargo sources
      run: |
        curl -L -o flatpak-cargo-generator.py \
          https://raw.githubusercontent.com/flatpak/flatpak-builder-tools/master/cargo/flatpak-cargo-generator.py
        python3 flatpak-cargo-generator.py Cargo.lock -o cargo-sources.json

    - uses: flatpak/flatpak-github-actions/flatpak-builder@v6
      with:
        bundle: meshtui.flatpak
        manifest-path: dev.gfd.meshtui.yaml
        cache-key: flatpak-builder-${{ github.sha }}

    - name: Upload flatpak bundle to release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: meshtui.flatpak
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
